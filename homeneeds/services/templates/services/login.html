<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h1>Login</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <button type="submit">Login</button>
    </form>

    <hr>

    <p>
        <a href="/">Home</a> |
        <a href="/register/">Register</a>
    </p>

</body>
</html>
